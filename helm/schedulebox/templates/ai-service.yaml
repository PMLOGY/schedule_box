apiVersion: v1
kind: Service
metadata:
  name: {{ include "schedulebox.fullname" . }}-ai
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "schedulebox.labels" . | nindent 4 }}
    app.kubernetes.io/component: ai-service
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.aiService.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "schedulebox.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ai-service

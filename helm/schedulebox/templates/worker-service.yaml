apiVersion: v1
kind: Service
metadata:
  name: {{ include "schedulebox.fullname" . }}-worker
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "schedulebox.labels" . | nindent 4 }}
    app.kubernetes.io/component: notification-worker
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    {{- include "schedulebox.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: notification-worker

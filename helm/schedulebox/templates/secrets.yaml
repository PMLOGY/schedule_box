{{- if not .Values.externalSecrets.enabled }}
# Native Kubernetes Secret — used when external-secrets-operator is not available.
# Provide values via --set secrets.* or CI environment variables.
# WARNING: Prefer ExternalSecret (below) for production deployments.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "schedulebox.fullname" . }}-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "schedulebox.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  REDIS_URL: {{ .Values.secrets.redisUrl | quote }}
  RABBITMQ_URL: {{ .Values.secrets.rabbitmqUrl | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  JWT_REFRESH_SECRET: {{ .Values.secrets.jwtRefreshSecret | quote }}
  SENTRY_DSN: {{ .Values.secrets.sentryDsn | quote }}
  SMTP_HOST: {{ .Values.secrets.smtpHost | default "smtp.cesky-hosting.cz" | quote }}
  SMTP_PORT: {{ .Values.secrets.smtpPort | default "587" | quote }}
  SMTP_USER: {{ .Values.secrets.smtpUser | quote }}
  SMTP_PASS: {{ .Values.secrets.smtpPass | quote }}
  SMTP_FROM: {{ .Values.secrets.smtpFrom | default "no-reply@schedulebox.cz" | quote }}
  TWILIO_ACCOUNT_SID: {{ .Values.secrets.twilioAccountSid | quote }}
  TWILIO_AUTH_TOKEN: {{ .Values.secrets.twilioAuthToken | quote }}
  TWILIO_FROM_NUMBER: {{ .Values.secrets.twilioFromNumber | quote }}
{{- end }}
---
{{- if .Values.externalSecrets.enabled }}
# ExternalSecret — fetches secrets from an external provider (AWS SSM, Vault, etc.)
# Requires external-secrets-operator to be installed in the cluster.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "schedulebox.fullname" . }}-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "schedulebox.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ include "schedulebox.fullname" . }}-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: {{ .Values.externalSecrets.remoteKeyPrefix }}/database-url
    - secretKey: REDIS_URL
      remoteRef:
        key: {{ .Values.externalSecrets.remoteKeyPrefix }}/redis-url
    - secretKey: RABBITMQ_URL
      remoteRef:
        key: {{ .Values.externalSecrets.remoteKeyPrefix }}/rabbitmq-url
    - secretKey: JWT_SECRET
      remoteRef:
        key: {{ .Values.externalSecrets.remoteKeyPrefix }}/jwt-secret
    - secretKey: JWT_REFRESH_SECRET
      remoteRef:
        key: {{ .Values.externalSecrets.remoteKeyPrefix }}/jwt-refresh-secret
    - secretKey: SENTRY_DSN
      remoteRef:
        key: {{ .Values.externalSecrets.remoteKeyPrefix }}/sentry-dsn
    - secretKey: SMTP_HOST
      remoteRef:
        key: {{ .Values.externalSecrets.remoteKeyPrefix }}/smtp-host
    - secretKey: SMTP_USER
      remoteRef:
        key: {{ .Values.externalSecrets.remoteKeyPrefix }}/smtp-user
    - secretKey: SMTP_PASS
      remoteRef:
        key: {{ .Values.externalSecrets.remoteKeyPrefix }}/smtp-pass
    - secretKey: SMTP_FROM
      remoteRef:
        key: {{ .Values.externalSecrets.remoteKeyPrefix }}/smtp-from
    - secretKey: TWILIO_ACCOUNT_SID
      remoteRef:
        key: {{ .Values.externalSecrets.remoteKeyPrefix }}/twilio-account-sid
    - secretKey: TWILIO_AUTH_TOKEN
      remoteRef:
        key: {{ .Values.externalSecrets.remoteKeyPrefix }}/twilio-auth-token
    - secretKey: TWILIO_FROM_NUMBER
      remoteRef:
        key: {{ .Values.externalSecrets.remoteKeyPrefix }}/twilio-from-number
{{- end }}

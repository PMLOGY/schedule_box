apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "schedulebox.fullname" . }}-web
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "schedulebox.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "schedulebox.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "schedulebox.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      containers:
      - name: web
        image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.web.service.targetPort }}
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readiness
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        resources:
          {{- toYaml .Values.web.resources | nindent 10 }}
        envFrom:
        - configMapRef:
            name: {{ include "schedulebox.fullname" . }}-config
        - secretRef:
            name: {{ include "schedulebox.fullname" . }}-secrets
        # Reduce DNS lookups for external domains (Node.js DNS caching pitfall)
        dnsConfig:
          options:
          - name: ndots
            value: "2"
      terminationGracePeriodSeconds: 30

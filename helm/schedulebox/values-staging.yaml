# Staging environment overrides

global:
  namespace: schedulebox-staging

web:
  replicaCount: 1
  image:
    tag: main
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  env:
    - name: NODE_ENV
      value: staging
    - name: LOG_LEVEL
      value: debug
    - name: LOG_FORMAT
      value: pretty

aiService:
  replicaCount: 1
  image:
    tag: main
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  env:
    - name: ENVIRONMENT
      value: staging

notificationWorker:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi
  env:
    - name: LOG_LEVEL
      value: debug

ingress:
  hosts:
    - host: staging.schedulebox.cz
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: schedulebox-staging-tls
      hosts:
        - staging.schedulebox.cz

hpa:
  enabled: false

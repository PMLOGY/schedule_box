# Bitnami RabbitMQ Helm Chart Values
# Chart: https://github.com/bitnami/charts/tree/main/bitnami/rabbitmq

# Replication: single node for MVP
replicaCount: 1

auth:
  # Use existing secret (create manually or via external-secrets-operator)
  existingPasswordSecret: "rabbitmq-credentials"
  existingErlangSecret: "rabbitmq-credentials"
  username: "schedulebox"

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""  # Use cluster default storage class

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# RabbitMQ configuration
configuration: |-
  ## Clustering
  cluster_formation.peer_discovery_backend = rabbit_peer_discovery_k8s
  cluster_formation.k8s.host = kubernetes.default.svc.cluster.local
  cluster_formation.node_cleanup.interval = 30
  cluster_formation.node_cleanup.only_log_warning = true
  cluster_partition_handling = autoheal

  ## Memory management
  vm_memory_high_watermark.relative = 0.6
  disk_free_limit.absolute = 2GB

  ## Performance
  channel_max = 2047
  heartbeat = 60

# Enable management plugin
plugins: "rabbitmq_management rabbitmq_prometheus"

# Service configuration
service:
  type: ClusterIP
  ports:
    amqp: 5672
    amqpTls: 5671
    dist: 25672
    manager: 15672
    metrics: 9419

# Metrics for monitoring
metrics:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

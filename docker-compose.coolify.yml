# =============================================================================
# ScheduleBox — Coolify Production Deployment (pre-built GHCR images)
# =============================================================================
# Images are built by GitHub Actions CI and pushed to GHCR automatically.
# No source code access needed — Coolify pulls pre-built images.
#
# Setup in Coolify:
#   1. Add GHCR registry (Settings → Docker Registries)
#   2. Create new Docker Compose resource, paste this file
#   3. Set environment variables below in Coolify UI
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: schedulebox
      POSTGRES_USER: schedulebox
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - schedulebox-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U schedulebox -d schedulebox']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    volumes:
      - schedulebox-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 3
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Database migrations (runs once, then exits)
  # ---------------------------------------------------------------------------
  migrate:
    image: ghcr.io/pmlogy/schedule_box-migrate:latest
    environment:
      # For Neon production: override DATABASE_URL in Coolify UI with unpooled Neon connection
      DATABASE_URL: ${DATABASE_URL_UNPOOLED:-postgresql://schedulebox:${POSTGRES_PASSWORD}@postgres:5432/schedulebox}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        cd /app &&
        pnpm --filter @schedulebox/database db:migrate &&
        pnpm --filter @schedulebox/database db:apply-sql &&
        echo '=== Migrations complete ==='
      "
    restart: 'no'

  # ---------------------------------------------------------------------------
  # ScheduleBox App (Next.js)
  # ---------------------------------------------------------------------------
  app:
    image: ghcr.io/pmlogy/schedule_box:latest
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      # For Neon production: set DATABASE_URL to pooled Neon connection in Coolify UI
      # For local docker-compose: uses the postgres container below
      DATABASE_URL: ${DATABASE_URL:-postgresql://schedulebox:${POSTGRES_PASSWORD}@postgres:5432/schedulebox}
      # Neon direct (unpooled) connection for migrations — set in Coolify UI for Neon
      DATABASE_URL_UNPOOLED: ${DATABASE_URL_UNPOOLED:-}
      # Upstash Redis HTTP (the app uses @upstash/redis HTTP client, not raw redis://)
      # Set these in Coolify UI — the local redis:// container is for fallback only
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL:-}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-}
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      TZ: Europe/Prague
      COMGATE_MERCHANT_ID: ${COMGATE_MERCHANT_ID:-}
      COMGATE_SECRET: ${COMGATE_SECRET:-}
      COMGATE_TEST_MODE: ${COMGATE_TEST_MODE:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@schedulebox.cz}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      CRON_SECRET: ${CRON_SECRET:-}
      SENTRY_ORG: ${SENTRY_ORG:-}
      SENTRY_PROJECT: ${SENTRY_PROJECT:-}
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: '0.1'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  schedulebox-pg-data:
  schedulebox-redis-data:

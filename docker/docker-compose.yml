version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: schedulebox-postgres
    environment:
      POSTGRES_DB: schedulebox
      POSTGRES_USER: schedulebox
      POSTGRES_PASSWORD: schedulebox
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U schedulebox -d schedulebox']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: schedulebox-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 3
    command: redis-server --appendonly yes
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: schedulebox-rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'check_running']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  ai-service:
    build:
      context: ../services/ai
      dockerfile: Dockerfile
    container_name: schedulebox-ai
    ports:
      - '8000:8000'
    environment:
      - ENVIRONMENT=development
      - AI_SERVICE_PORT=8000
      - REDIS_URL=redis://redis:6379
      - SCHEDULEBOX_API_URL=http://app:3000
      - MODEL_DIR=/app/models
      - ALLOWED_ORIGINS=http://localhost:3000,http://app:3000
      - LOG_LEVEL=debug
      # Phase 14: Voice booking, follow-up generation, competitor intelligence
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4-turbo}
      - OPENAI_FOLLOWUP_MODEL=${OPENAI_FOLLOWUP_MODEL:-gpt-4o-mini}
      - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY:-}
      - MAX_AUDIO_SIZE_MB=${MAX_AUDIO_SIZE_MB:-10}
      - MAX_FOLLOWUP_PER_DAY=${MAX_FOLLOWUP_PER_DAY:-50}
      - MAX_COMPETITORS_PER_COMPANY=${MAX_COMPETITORS_PER_COMPANY:-5}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")" || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ../services/ai:/app
      - ai_models:/app/models
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: development
    container_name: schedulebox-app
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://schedulebox:schedulebox@postgres:5432/schedulebox
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - NEXT_TELEMETRY_DISABLED=1
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ..:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    command: pnpm --filter @schedulebox/web dev
    restart: unless-stopped

  notification-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: development
    container_name: schedulebox-notification-worker
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://schedulebox:schedulebox@postgres:5432/schedulebox
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - SMTP_HOST=${SMTP_HOST:-localhost}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@schedulebox.cz}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER:-}
      - TWILIO_MESSAGING_SERVICE_SID=${TWILIO_MESSAGING_SERVICE_SID:-}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ..:/app
      - /app/node_modules
    command: pnpm --filter @schedulebox/notification-worker start
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  ai_models:
